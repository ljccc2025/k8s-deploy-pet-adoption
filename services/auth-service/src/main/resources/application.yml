spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pet_adoption}
    username: ${DB_USERNAME:pet}
    password: ${DB_PASSWORD:pet}
  flyway:
    schemas: auth_schema
    default-schema: auth_schema
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: auth_schema

server:
  port: 8081

jwt:
  issuer: ${JWT_ISSUER:pet-adoption-auth-service}
  secret: ${JWT_SECRET:change-me-local-dev-secret-at-least-32-bytes}
  access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:60}

management:
  endpoints:
    web:
      exposure:
        include: health,info
